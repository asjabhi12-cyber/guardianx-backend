<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<title>GuardianX - Parent Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, Segoe UI, Roboto, sans-serif;
    margin: 0;
    background: #f4f6fb;
    color: #1a1f2b;
  }

  /* ---------- Login screen ---------- */
  #loginScreen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a2332 0%, #2c3e50 100%);
  }
  .login-box {
    background: white;
    border-radius: 16px;
    padding: 40px 36px;
    width: 90%;
    max-width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .login-logo {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, #3498db, #2c3e50);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin: 0 auto 16px;
  }
  .login-box h1 { font-size: 20px; margin: 0 0 4px; font-weight: 800; }
  .login-box p { font-size: 13px; color: #8a94a6; margin: 0 0 24px; }
  .login-box input {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1.5px solid #e3e7ee; font-size: 14px; margin-bottom: 12px;
    font-family: inherit; outline: none; transition: border-color .15s;
  }
  .login-box input:focus { border-color: #3498db; }
  .login-box button {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #2c3e50; color: white; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: inherit; transition: background .15s;
  }
  .login-box button:hover { background: #1a2634; }
  .login-error { color: #e74c3c; font-size: 12px; margin-top: 10px; min-height: 16px; }

  /* ---------- Main dashboard ---------- */
  #dashboard { display: none; height: 100vh; flex-direction: column; }
  header {
    background: #1a2332;
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #3498db, #2c3e50);
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: .2px; }
  header .sub { font-size: 11px; color: #8a94a6; margin-top: 1px; }
  .logout-btn {
    background: rgba(255,255,255,0.08); border: none; color: #cfd6e3;
    padding: 7px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 600;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.15); }

  .container { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }

  .sidebar {
    width: 340px;
    background: white;
    padding: 18px;
    overflow-y: auto;
    border-right: 1px solid #eaedf3;
    flex-shrink: 0;
  }
  .section-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: #9aa4b5; margin: 18px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  .pair-box {
    background: linear-gradient(135deg, #eef5ff, #f4f8ff);
    border: 1px solid #dde9fb;
    border-radius: 14px;
    padding: 16px;
  }
  .pair-box input {
    padding: 10px 12px; margin-top: 8px; width: 100%;
    border-radius: 9px; border: 1.5px solid #d8e2f0; font-size: 13px;
    font-family: inherit; outline: none;
  }
  .pair-box button {
    margin-top: 10px; padding: 10px; width: 100%;
    background: #2c3e50; color: white; border: none; border-radius: 9px;
    cursor: pointer; font-weight: 700; font-size: 13px; font-family: inherit;
  }
  .pair-box button:hover { background: #1a2634; }
  .code-display {
    font-size: 26px; font-weight: 800; text-align: center; margin-top: 12px;
    letter-spacing: 6px; color: #2c3e50; background: white;
    border-radius: 9px; padding: 10px; border: 1px dashed #b8c7e0;
  }

  .device-card {
    border: 1px solid #eaedf3; border-radius: 12px; padding: 13px;
    margin-bottom: 10px; cursor: pointer; transition: all .15s;
    background: white;
  }
  .device-card:hover { border-color: #c5d8f2; box-shadow: 0 2px 10px rgba(52,152,219,0.08); }
  .device-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .device-card h3 { margin: 0 0 3px; font-size: 14px; font-weight: 700; }
  .device-card p { margin: 2px 0; font-size: 11.5px; color: #8a94a6; }
  .device-status-dot {
    width: 8px; height: 8px; border-radius: 4px; display: inline-block;
    margin-right: 5px; background: #bbb;
  }
  .device-status-dot.online { background: #2ecc71; }
  .device-actions { display: flex; gap: 6px; margin-top: 8px; }
  .device-actions button {
    flex: 1; font-size: 11px; padding: 6px; border-radius: 7px; border: none;
    cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .btn-rename { background: #eef2f7; color: #4a5568; }
  .btn-rename:hover { background: #e1e7ee; }
  .btn-remove { background: #fdecea; color: #e74c3c; }
  .btn-remove:hover { background: #fbdad7; }
  .btn-history { background: #eaf3fd; color: #2c7be5; }
  .btn-history:hover { background: #dcebfb; }
  .btn-history.active { background: #2c7be5; color: white; }

  .empty-state { text-align: center; color: #b0b8c5; font-size: 12.5px; padding: 30px 10px; }

  .gx-popup { font-family: inherit; font-size: 12.5px; min-width: 180px; }
  .gx-popup .gx-popup-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; }
  .gx-popup .gx-popup-landmark { color: #2c7be5; font-weight: 700; font-size: 12.5px; margin-bottom: 3px; }
  .gx-popup .gx-popup-address { color: #4a5568; line-height: 1.4; }
  .gx-popup .gx-popup-meta { color: #9aa4b5; margin-top: 6px; font-size: 11px; }
  .gx-popup .gx-popup-loading { color: #9aa4b5; font-style: italic; }

  .device-location-line {
    font-size: 12px;
    color: #5a6b7a;
    margin-top: 4px;
    line-height: 1.4;
  }
  .device-location-line .lbl { color: #9aa4b5; }
  .device-location-line .landmark-tag {
    color: #2c7be5;
    font-weight: 700;
  }
  .device-warning {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff4e5;
    border: 1px solid #ffdca8;
    color: #a15c00;
    font-size: 11.5px;
    font-weight: 600;
    border-radius: 8px;
    padding: 6px 10px;
    margin-top: 8px;
  }

  /* ---------- Mobile: sidebar becomes a slide-up drawer over the map ---------- */
  .sidebar-drag-handle { display: none; }
  .mobile-menu-btn { display: none; }

  @media (max-width: 768px) {
    .container { position: relative; }

    .sidebar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-height: 72vh;
      border-right: none;
      border-top: 1px solid #eaedf3;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -6px 28px rgba(0,0,0,0.18);
      transform: translateY(100%);
      transition: transform .28s ease;
      z-index: 1000;
    }
    .sidebar.open { transform: translateY(0); }

    .sidebar-drag-handle {
      display: block;
      width: 40px;
      height: 4px;
      background: #dde3ec;
      border-radius: 2px;
      margin: 0 auto 14px;
      cursor: pointer;
    }

    .mobile-menu-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      position: fixed;
      right: 16px;
      bottom: 22px;
      z-index: 1001;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    header { padding: 12px 16px; }
    header h1 { font-size: 14px; }
    header .sub { font-size: 10px; }
    .brand-icon { width: 30px; height: 30px; font-size: 15px; }
    .logout-btn { padding: 6px 12px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🛡️</div>
    <h1>GuardianX Dashboard</h1>
    <p>Aage badhne ke liye password daalein</p>
    <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter') doLogin()" />
    <button onclick="doLogin()">Login</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ===== Main Dashboard ===== -->
<div id="dashboard">
  <header>
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <div>
        <h1>GuardianX</h1>
        <div class="sub">Parent Dashboard</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <div class="container">
    <div class="sidebar">
      <div class="sidebar-drag-handle" onclick="toggleSidebar()"></div>
      <div class="section-label">Naya device jodein</div>
      <div class="pair-box">
        <input type="text" id="deviceLabel" placeholder="Naam daalein (jaise: Rahul ka phone)" />
        <button onclick="createPairCode()">Pairing Code Banao</button>
        <div class="code-display" id="codeDisplay" style="display:none;"></div>
      </div>

      <div class="section-label">Paired Devices</div>
      <div id="deviceList"></div>
    </div>
    <div id="map"></div>
    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">📋 Devices</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let dashboardPassword = sessionStorage.getItem('gx_pw') || '';
  let map, markers = {};
  let trails = {}; // deviceId -> { polyline, pointMarkers: [] }
  let deviceLabels = {}; // deviceId -> label, kept in sync for popups

  // ---------- Reverse geocoding (OpenStreetMap Nominatim, free, no API key) ----------
  // Simple cache (rounded coords) + a tiny request queue so we stay within
  // Nominatim's fair-use rate limit (max ~1 request/second).
  const addressCache = {};
  let geocodeQueue = Promise.resolve();

  function cacheKey(lat, lon) {
    return lat.toFixed(4) + ',' + lon.toFixed(4);
  }

  function reverseGeocode(lat, lon) {
    const key = cacheKey(lat, lon);
    if (addressCache[key]) return Promise.resolve(addressCache[key]);

    geocodeQueue = geocodeQueue.then(() => new Promise(resolve => setTimeout(resolve, 1000)));
    return geocodeQueue.then(() =>
      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1&namedetails=1&extratags=1`, {
        headers: { 'Accept-Language': 'en' }
      })
        .then(r => r.json())
        .then(data => {
          const address = data && data.display_name ? data.display_name : 'Address not found';
          // If the point itself sits on/inside a named place (hotel, hospital, mall, etc.)
          // Nominatim's own "name" + "type"/"class" fields already tell us that directly —
          // no separate landmark lookup needed for this common case.
          let directPlace = null;
          if (data && data.name && data.address) {
            const cls = data.class || '';
            const typ = data.type || '';
            const knownKinds = ['hospital','hotel','restaurant','school','college','university',
              'mall','clinic','pharmacy','bank','park','stadium','place_of_worship','fuel',
              'guest_house','hostel'];
            if (knownKinds.includes(typ) || cls === 'amenity' || cls === 'tourism' || cls === 'shop') {
              directPlace = { name: data.name, type: typ || cls };
            }
          }
          const result = { address, directPlace };
          addressCache[key] = result;
          return result;
        })
        .catch(() => ({ address: 'Could not load address', directPlace: null }))
    );
  }

  // ---------- Nearby landmark lookup (Overpass API — free, no API key) ----------
  // Finds the closest named hospital / hotel / restaurant / school / mall / etc.
  // A single tight radius often finds nothing (e.g. a mall might be 400m-1.5km
  // away, not 120m), so we search in widening rings and stop as soon as we
  // find a named place. Last ring also accepts any named building as a fallback.
  const landmarkCache = {};
  const LANDMARK_KINDS = {
    amenity: ['hospital', 'clinic', 'restaurant', 'cafe', 'school', 'college', 'university',
      'bank', 'pharmacy', 'place_of_worship', 'police', 'fuel', 'fast_food', 'bar', 'cinema',
      'marketplace', 'townhall', 'library', 'bus_station'],
    tourism: ['hotel', 'guest_house', 'hostel', 'attraction', 'museum'],
    shop: ['mall', 'supermarket', 'department_store'],
    leisure: ['park', 'stadium', 'sports_centre'],
    building: ['mall', 'commercial', 'retail', 'hospital', 'hotel']
  };
  const SEARCH_RINGS = [150, 400, 1000, 2000]; // meters, tried in order

  function toRad(v) { return v * Math.PI / 180; }
  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function formatDistance(m) {
    if (m >= 1000) return (m / 1000).toFixed(1) + ' km';
    return m + ' mtr';
  }

  // Overpass also gets its own gentle rate-limit queue so we don't hammer the
  // free public endpoint when several markers/points load at once.
  let overpassQueue = Promise.resolve();

  function queryOverpass(query) {
    overpassQueue = overpassQueue.then(() => new Promise(resolve => setTimeout(resolve, 600)));
    return overpassQueue.then(() =>
      fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: 'data=' + encodeURIComponent(query)
      }).then(r => r.json())
    );
  }

  function bestNamedElement(elements, lat, lon) {
    let best = null;
    let bestDist = Infinity;
    (elements || []).forEach(el => {
      const name = el.tags && (el.tags.name || el.tags['name:en']);
      if (!name) return; // skip unnamed places, not useful to a parent
      const elLat = el.lat || (el.center && el.center.lat);
      const elLon = el.lon || (el.center && el.center.lon);
      if (elLat == null || elLon == null) return;
      const dist = distanceMeters(lat, lon, elLat, elLon);
      if (dist < bestDist) {
        bestDist = dist;
        const kind = el.tags.amenity || el.tags.tourism || el.tags.shop ||
          el.tags.leisure || el.tags.building || '';
        best = { name, kind, distance: Math.round(dist) };
      }
    });
    return best;
  }

  // Tries each ring in order (150m, 400m, 1km, 2km) and returns the nearest
  // named landmark found in the first ring that has one.
  function findNearbyLandmark(lat, lon, ringIndex = 0) {
    if (ringIndex >= SEARCH_RINGS.length) return Promise.resolve(null);
    const radius = SEARCH_RINGS[ringIndex];
    const key = cacheKey(lat, lon) + ':' + radius;
    if (landmarkCache[key] !== undefined) {
      if (landmarkCache[key]) return Promise.resolve(landmarkCache[key]);
      return findNearbyLandmark(lat, lon, ringIndex + 1);
    }

    const filters = [];
    for (const tag in LANDMARK_KINDS) {
      const regex = LANDMARK_KINDS[tag].join('|');
      filters.push(`node(around:${radius},${lat},${lon})[${tag}~"^(${regex})$"];`);
      filters.push(`way(around:${radius},${lat},${lon})[${tag}~"^(${regex})$"];`);
    }
    const query = `[out:json][timeout:10];(${filters.join('')});out center 15;`;

    return queryOverpass(query)
      .then(data => {
        const best = bestNamedElement(data.elements, lat, lon);
        landmarkCache[key] = best;
        if (best) return best;
        return findNearbyLandmark(lat, lon, ringIndex + 1);
      })
      .catch(() => findNearbyLandmark(lat, lon, ringIndex + 1));
  }

  const KIND_LABELS_HI = {
    hospital: 'Hospital', clinic: 'Clinic', restaurant: 'Restaurant', cafe: 'Cafe',
    school: 'School', college: 'College', university: 'University', bank: 'Bank',
    pharmacy: 'Pharmacy', place_of_worship: 'Dharmik sthal', police: 'Police Station',
    fuel: 'Petrol Pump', fast_food: 'Fast Food', bar: 'Bar', cinema: 'Cinema',
    marketplace: 'Market', townhall: 'Town Hall', library: 'Library', bus_station: 'Bus Station',
    hotel: 'Hotel', guest_house: 'Guest House', hostel: 'Hostel',
    attraction: 'Attraction', museum: 'Museum', mall: 'Mall', supermarket: 'Supermarket',
    department_store: 'Store', park: 'Park', stadium: 'Stadium', sports_centre: 'Sports Centre',
    commercial: 'Commercial Building', retail: 'Shopping Area'
  };

  // Combines Nominatim's address with the nearest named landmark so the UI can
  // show something like: "🏬 Wonder Mall ke paas · 850 mtr · Road: MG Road, ..."
  function describeLocation(lat, lon) {
    return Promise.all([reverseGeocode(lat, lon), findNearbyLandmark(lat, lon)])
      .then(([geo, landmark]) => {
        let landmarkLine = null;
        if (geo.directPlace) {
          const label = KIND_LABELS_HI[geo.directPlace.type] || geo.directPlace.type;
          landmarkLine = `📍 ${geo.directPlace.name} (${label}) ke andar`;
        } else if (landmark) {
          const label = KIND_LABELS_HI[landmark.kind] || landmark.kind || 'Jagah';
          landmarkLine = `📍 ${landmark.name} (${label}) ke paas · ${formatDistance(landmark.distance)}`;
        }
        return { address: geo.address, landmarkLine };
      });
  }

  function buildPopupHtml(title, lat, lon, timestamp) {
    const timeStr = timestamp ? new Date(timestamp).toLocaleString() : '';
    return `
      <div class="gx-popup">
        <div class="gx-popup-title">${title}</div>
        <div class="gx-popup-landmark gx-popup-loading" id="landmark-${lat}-${lon}"></div>
        <div class="gx-popup-address gx-popup-loading" id="addr-${lat}-${lon}">Loading address...</div>
        ${timeStr ? `<div class="gx-popup-meta">🕒 ${timeStr}</div>` : ''}
        <div class="gx-popup-meta">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>
      </div>
    `;
  }

  function attachAddressPopup(layer, label, lat, lon, timestamp) {
    layer.bindPopup(buildPopupHtml(label, lat, lon, timestamp));
    layer.on('popupopen', () => {
      describeLocation(lat, lon).then(({ address, landmarkLine }) => {
        const addrEl = document.getElementById(`addr-${lat}-${lon}`);
        if (addrEl) {
          addrEl.innerText = address;
          addrEl.classList.remove('gx-popup-loading');
        }
        const landmarkEl = document.getElementById(`landmark-${lat}-${lon}`);
        if (landmarkEl) {
          landmarkEl.classList.remove('gx-popup-loading');
          landmarkEl.innerText = landmarkLine || '';
          landmarkEl.style.display = landmarkLine ? 'block' : 'none';
        }
      });
    });
  }

  async function doLogin() {
    const pw = document.getElementById('passwordInput').value;
    const errEl = document.getElementById('loginError');
    errEl.innerText = '';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (data.ok) {
        dashboardPassword = pw;
        sessionStorage.setItem('gx_pw', pw);
        showDashboard();
      } else {
        errEl.innerText = 'Galat password, dobara try karein.';
      }
    } catch (e) {
      errEl.innerText = 'Connection error. Dobara try karein.';
    }
  }

  function logout() {
    sessionStorage.removeItem('gx_pw');
    dashboardPassword = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'x-dashboard-password': dashboardPassword };
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    if (!map) initMap();
    loadDevices();
    setInterval(loadDevices, 15000);
  }

  function initMap() {
    map = L.map('map').setView([20.5937, 78.9629], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
  }

  async function createPairCode() {
    const label = document.getElementById('deviceLabel').value || 'Unnamed device';
    const res = await fetch('/api/pair/create', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ deviceLabel: label })
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    const codeEl = document.getElementById('codeDisplay');
    codeEl.style.display = 'block';
    codeEl.innerText = data.code;
  }

  async function renameDevice(deviceId, currentLabel) {
    const newLabel = prompt('Naya naam daalein:', currentLabel);
    if (!newLabel) return;
    await fetch('/api/devices/' + deviceId, {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify({ deviceLabel: newLabel })
    });
    loadDevices();
  }

  async function removeDevice(deviceId, label) {
    if (!confirm(`"${label}" ko remove karein? Iska pura location history bhi delete ho jayega.`)) return;
    await fetch('/api/devices/' + deviceId, {
      method: 'DELETE',
      headers: authHeaders()
    });
    if (markers[deviceId]) {
      map.removeLayer(markers[deviceId]);
      delete markers[deviceId];
    }
    removeTrail(deviceId);
    loadDevices();
  }

  async function loadDevices() {
    const res = await fetch('/api/devices', { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const devices = await res.json();
    const listEl = document.getElementById('deviceList');
    listEl.innerHTML = '';

    if (devices.length === 0) {
      listEl.innerHTML = '<div class="empty-state">Abhi koi device paired nahi hai.<br/>Upar se pairing code banayein.</div>';
      return;
    }

    devices.forEach(d => {
      const isOnline = d.lastSeen && (Date.now() - d.lastSeen) < 20 * 60 * 1000; // 20 min threshold
      const lastSeenStr = d.lastSeen ? timeAgo(d.lastSeen) : 'Kabhi nahi';
      const locationOff = d.locationEnabled === false;

      const card = document.createElement('div');
      card.className = 'device-card';
      card.innerHTML = `
        <div class="device-card-top" onclick="focusDevice('${d.deviceId}')">
          <div>
            <h3>${escapeHtml(d.deviceLabel)}</h3>
            <p><span class="device-status-dot ${isOnline ? 'online' : ''}"></span>${isOnline ? 'Active' : 'Last seen: ' + lastSeenStr}</p>
            <div class="device-location-line"><span class="lbl">📍 Ab yahan:</span> <span id="addr-now-${d.deviceId}">${d.lastLocation ? 'Loading address...' : 'Abhi tak koi location nahi'}</span></div>
            <div class="device-location-line"><span class="lbl">🕓 Pehle yahan tha:</span> <span id="addr-prev-${d.deviceId}">${d.previousLocation ? 'Loading address...' : '—'}</span></div>
            ${locationOff ? '<div class="device-warning">⚠️ Location band hai is device par — aakhri maloom jagah upar dikh rahi hai.</div>' : ''}
          </div>
        </div>
        <div class="device-actions">
          <button class="btn-rename" onclick="event.stopPropagation(); renameDevice('${d.deviceId}', '${escapeHtml(d.deviceLabel)}')">✏️ Rename</button>
          <button class="btn-history ${trails[d.deviceId] ? 'active' : ''}" onclick="event.stopPropagation(); toggleHistory('${d.deviceId}', '${escapeHtml(d.deviceLabel)}')">🧭 Path</button>
          <button class="btn-remove" onclick="event.stopPropagation(); removeDevice('${d.deviceId}', '${escapeHtml(d.deviceLabel)}')">🗑️ Remove</button>
        </div>
      `;
      listEl.appendChild(card);

      if (d.lastLocation) {
        describeLocation(d.lastLocation.latitude, d.lastLocation.longitude).then(({ address, landmarkLine }) => {
          const el = document.getElementById('addr-now-' + d.deviceId);
          if (el) {
            el.innerHTML = (landmarkLine ? `<span class="landmark-tag">${escapeHtml(landmarkLine)}</span><br/>` : '') + escapeHtml(address);
          }
        });
      }
      if (d.previousLocation) {
        describeLocation(d.previousLocation.latitude, d.previousLocation.longitude).then(({ address, landmarkLine }) => {
          const el = document.getElementById('addr-prev-' + d.deviceId);
          if (el) {
            el.innerHTML = (landmarkLine ? `<span class="landmark-tag">${escapeHtml(landmarkLine)}</span><br/>` : '') + escapeHtml(address);
          }
        });
      }

      if (d.lastLocation) {
        const pos = [d.lastLocation.latitude, d.lastLocation.longitude];
        if (markers[d.deviceId]) {
          markers[d.deviceId].setLatLng(pos);
        } else {
          markers[d.deviceId] = L.marker(pos).addTo(map);
        }
        attachAddressPopup(
          markers[d.deviceId],
          '📍 ' + d.deviceLabel,
          d.lastLocation.latitude,
          d.lastLocation.longitude,
          d.lastLocation.timestamp
        );
      }
    });
  }

  function toggleSidebar() {
    const sb = document.querySelector('.sidebar');
    const btn = document.getElementById('mobileMenuBtn');
    sb.classList.toggle('open');
    if (btn) btn.innerText = sb.classList.contains('open') ? '🗺️ Map dikhao' : '📋 Devices';
  }

  function closeSidebarOnMobile() {
    if (window.innerWidth > 768) return;
    const sb = document.querySelector('.sidebar');
    const btn = document.getElementById('mobileMenuBtn');
    sb.classList.remove('open');
    if (btn) btn.innerText = '📋 Devices';
  }

  function focusDevice(deviceId) {
    if (markers[deviceId]) {
      map.setView(markers[deviceId].getLatLng(), 15);
      markers[deviceId].openPopup();
    }
    closeSidebarOnMobile();
  }

  // ---------- Location history trail (multiple points on the map) ----------
  // The backend only returns points from the last 24 hours (rolling window),
  // so as time passes the path naturally "refreshes" to reflect today's route.
  // While a trail is open we also re-fetch it every few minutes so it stays current.
  async function toggleHistory(deviceId, label) {
    if (trails[deviceId]) {
      removeTrail(deviceId);
      loadDevices();
      return;
    }
    await drawTrail(deviceId, label, { fit: true });
    closeSidebarOnMobile();
  }

  async function drawTrail(deviceId, label, opts) {
    opts = opts || {};
    const res = await fetch('/api/devices/' + deviceId + '/history?hours=24', { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const history = await res.json();

    // Remove any existing layers for this device before redrawing
    removeTrail(deviceId);

    if (!history || history.length === 0) {
      if (opts.fit) alert(`"${label}" ke liye pichhle 24 ghanton mein koi location history nahi hai.`);
      return;
    }

    const latLngs = history.map(p => [p.latitude, p.longitude]);
    const polyline = L.polyline(latLngs, { color: '#2c7be5', weight: 3, opacity: 0.7 }).addTo(map);

    const pointMarkers = history.map((p, i) => {
      const isLast = i === history.length - 1;
      const circle = L.circleMarker([p.latitude, p.longitude], {
        radius: isLast ? 7 : 5,
        color: isLast ? '#2ecc71' : '#2c7be5',
        fillColor: isLast ? '#2ecc71' : '#2c7be5',
        fillOpacity: 0.9,
        weight: 2,
      }).addTo(map);
      attachAddressPopup(circle, `${label} · point ${i + 1}/${history.length}`, p.latitude, p.longitude, p.timestamp);
      return circle;
    });

    trails[deviceId] = { polyline, pointMarkers, label };
    loadDevices();
    if (opts.fit) {
      map.fitBounds(polyline.getBounds(), { padding: [40, 40] });
    }
  }

  // Every 5 minutes, silently redraw any trail that's currently open so the
  // 24-hour window stays up to date without the person needing to click again.
  setInterval(() => {
    Object.keys(trails).forEach(deviceId => {
      const label = trails[deviceId].label;
      drawTrail(deviceId, label, { fit: false });
    });
  }, 5 * 60 * 1000);

  function removeTrail(deviceId) {
    const trail = trails[deviceId];
    if (!trail) return;
    map.removeLayer(trail.polyline);
    trail.pointMarkers.forEach(m => map.removeLayer(m));
    delete trails[deviceId];
  }

  function timeAgo(ts) {
    const diffMin = Math.floor((Date.now() - ts) / 60000);
    if (diffMin < 1) return 'abhi abhi';
    if (diffMin < 60) return diffMin + ' min pehle';
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + ' ghante pehle';
    return Math.floor(diffHr / 24) + ' din pehle';
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Agar pehle se login ho, seedha dashboard dikhao
  if (dashboardPassword) {
    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: dashboardPassword })
    }).then(r => r.json()).then(d => {
      if (d.ok) showDashboard();
    });
  }
</script>
